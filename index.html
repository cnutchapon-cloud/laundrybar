<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyR52VlHFrdeb8ATD3mhReCgCUNkMmzumxvwulMG45VGZ31K0cVxMf1E-eA_3Sd0RKR/exec";

function sendData(status) {

navigator.geolocation.getCurrentPosition((position) => {

const data = {
name: document.getElementById("name").value,
status: status,
time: new Date().toLocaleTimeString(),
lat: position.coords.latitude,
lng: position.coords.longitude
};

fetch(API_URL, {
method: "POST",
body: JSON.stringify(data)
})
.then(response => response.text())
.then(data => {
alert("บันทึกสำเร็จ");
})
.catch(error => {
alert("เกิดข้อผิดพลาด");
console.log(error);
});

});

}

function checkin() {
sendData("เข้างาน");
}

function checkout() {
sendData("ออกงาน");
}

</script>
